<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Awalé — Vous contre l'IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --human:#e8a33d; --human-glow:rgba(232,163,61,.55);
    --ai:#56b9ad; --ai-glow:rgba(86,185,173,.5);
    --text:#f3e9d6; --muted:#a98f70;
    --serif:'Fraunces', Georgia, 'Times New Roman', serif;
    --sans:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh; background:#0c0805; color:var(--text);
    font-family:var(--sans); display:flex; justify-content:center;
    position:relative; overflow-x:hidden; -webkit-font-smoothing:antialiased;
  }

  /* ===== Décor : lac de Buyo, fin d'après-midi ===== */
  .scenery{ position:fixed; inset:0; z-index:0; overflow:hidden; }
  .sky{ position:absolute; inset:0; background:linear-gradient(180deg,#1d4751 0%,#336a64 20%,#5f8459 38%,#ab8350 52%,#e6ad58 62%,#f2bf68 67%); }
  .clouds{ position:absolute; inset:0; animation:drift 60s ease-in-out infinite alternate; }
  .cloud{ position:absolute; border-radius:50%; filter:blur(8px); }
  .c1{ left:8%; top:14%; width:44%; height:7%; background:radial-gradient(closest-side,rgba(255,236,206,.5),rgba(255,236,206,0)); }
  .c2{ left:52%; top:22%; width:40%; height:6%; background:radial-gradient(closest-side,rgba(255,228,196,.45),rgba(255,228,196,0)); }
  .c3{ left:20%; top:30%; width:36%; height:5%; background:radial-gradient(closest-side,rgba(255,222,188,.4),rgba(255,222,188,0)); }
  .sun{ position:absolute; left:50%; top:48%; width:min(72vw,380px); height:min(72vw,380px); transform:translate(-50%,-50%);
        border-radius:50%; background:radial-gradient(circle,rgba(255,244,210,.98),rgba(255,206,120,.6) 30%,rgba(255,184,96,.15) 55%,rgba(255,180,90,0) 72%); }
  .mtn{ position:absolute; left:0; right:0; bottom:35.5%; width:100%; height:16%; opacity:.5; filter:blur(1.5px); }
  .hills{ position:absolute; left:0; right:0; bottom:34%; width:100%; height:13%; opacity:.92; }
  .shore{ position:absolute; left:0; right:0; bottom:33%; width:100%; height:13%; }
  .lake{ position:absolute; left:0; right:0; top:66%; bottom:0; background:linear-gradient(180deg,#e8ac5e 0%,#b29a58 9%,#6a8f6c 26%,#34655c 56%,#163d3a 100%); }
  .sunpath{ position:absolute; left:50%; top:66%; bottom:0; width:min(46vw,170px); transform:translateX(-50%);
            background:linear-gradient(180deg,rgba(255,232,168,.7),rgba(255,212,128,0) 62%); filter:blur(3px); animation:shimmer 5s ease-in-out infinite; }
  .ripple{ position:absolute; left:0; right:0; top:66%; bottom:0; opacity:.5;
           background:repeating-linear-gradient(180deg,rgba(255,255,255,.07) 0 1px,transparent 1px 9px); animation:ripple 7s linear infinite; }
  .veil{ position:absolute; inset:0; background:
           radial-gradient(120% 90% at 50% 30%,rgba(8,6,3,0) 40%,rgba(8,6,3,.3) 100%),
           linear-gradient(180deg,rgba(8,6,3,.5) 0%,rgba(8,6,3,.08) 22%,rgba(8,6,3,.06) 56%,rgba(8,6,3,.4) 100%); }

  /* ===== Contenu ===== */
  .wrap{ position:relative; z-index:1; width:100%; max-width:480px; padding:20px 12px 30px; }
  .panel{ border-radius:26px; padding:16px 11px 18px; background:rgba(16,11,6,.5);
          border:1px solid rgba(255,225,180,.13); box-shadow:0 20px 52px rgba(0,0,0,.45);
          backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); opacity:0; transform:translateY(10px); transition:opacity .5s ease, transform .5s ease; }
  .panel.in{ opacity:1; transform:none; }

  .head{ text-align:center; margin-bottom:15px; }
  .head h1{ margin:0; font-family:var(--serif); font-weight:600; font-size:31px; letter-spacing:.01em; }
  .head p{ margin:3px 0 0; font-size:12.5px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; }

  .scores{ display:flex; gap:10px; margin-bottom:12px; }
  .score{ position:relative; flex:1; padding:11px 15px; border-radius:16px; background:rgba(255,255,255,.025);
          border:1.5px solid rgba(255,255,255,.08); transition:all .3s ease; }
  .score.human{ --ac:var(--human); --gl:rgba(232,163,61,.19); }
  .score.ai{ --ac:var(--ai); --gl:rgba(86,185,173,.19); }
  .score.active{ background:rgba(255,255,255,.065); border-color:var(--ac); box-shadow:0 0 22px var(--gl); }
  .score .label{ font-size:13px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); }
  .score .num{ font-family:var(--serif); font-size:42px; font-weight:600; color:var(--ac); line-height:1.1; display:inline-block; }
  .score .plus{ position:absolute; right:14px; top:6px; font-family:var(--serif); font-size:22px; font-weight:600; color:var(--ac); pointer-events:none; opacity:0; }
  .score .plus.go{ animation:floatUp 1s ease forwards; }

  .row{ display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .seg{ display:flex; flex:1; padding:3px; gap:3px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); }
  .seg.locked{ opacity:.5; }
  .seg button{ flex:1; padding:7px 0; border-radius:9px; border:none; cursor:pointer; font-family:var(--sans);
               font-size:14px; font-weight:500; color:var(--muted); background:transparent; transition:all .2s ease; -webkit-tap-highlight-color:transparent; }
  .seg.locked button{ cursor:default; }
  .seg.diff button.on{ color:#1a120a; background:var(--human); font-weight:700; box-shadow:0 2px 8px rgba(232,163,61,.35); }
  .seg.starter button.on{ color:#0c1f1c; background:var(--ai); font-weight:700; box-shadow:0 2px 8px rgba(86,185,173,.3); }
  .seg.starter button{ font-size:13.5px; }
  .starter-label{ flex-shrink:0; font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .sound-btn{ width:42px; height:42px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:12px;
              cursor:pointer; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); -webkit-tap-highlight-color:transparent; }
  .sound-btn.on{ border-color:rgba(232,163,61,.4); }

  .status{ display:flex; justify-content:center; margin-bottom:13px; }
  .pill{ display:inline-flex; align-items:center; gap:8px; padding:7px 17px; border-radius:999px; background:rgba(255,255,255,.05);
         border:1px solid rgba(255,255,255,.15); font-size:15px; font-weight:500; }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--muted); }
  .pill.live .dot{ animation:blink 1.2s infinite; }

  /* ===== Plateau ===== */
  .board{ position:relative; width:100%; padding:4%; border-radius:28px;
    background:
      repeating-linear-gradient(96deg,rgba(255,225,180,.05) 0 2px,rgba(0,0,0,0) 2px 9px),
      repeating-linear-gradient(91deg,rgba(40,18,4,.18) 0 1px,rgba(0,0,0,0) 1px 14px),
      linear-gradient(158deg,#8a572c,#5e3818 50%,#3a2010);
    box-shadow:0 22px 48px rgba(0,0,0,.55),0 2px 0 rgba(255,210,150,.12),
      inset 0 2px 0 rgba(255,220,170,.22),inset 0 -14px 30px rgba(0,0,0,.45),inset 0 0 0 1px rgba(20,10,2,.5);
  }
  .brow{ display:flex; gap:2.4%; }
  .bdiv{ height:2px; margin:3% 8%; border-radius:2px;
         background:linear-gradient(90deg,rgba(0,0,0,.05),rgba(0,0,0,.35),rgba(0,0,0,.05)); box-shadow:0 1px 0 rgba(255,210,150,.14); }
  .camps{ display:flex; justify-content:space-between; margin-top:9px; padding:0 5px; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; }
  .camps .ai{ color:var(--ai); } .camps .hu{ color:var(--human); }

  .pit{ position:relative; flex:1; aspect-ratio:1; border-radius:50%; padding:0; cursor:default;
        border:1px solid rgba(20,10,2,.55);
        background:radial-gradient(circle at 50% 36%,#2c1c0f,#150c06 84%);
        box-shadow:inset 0 6px 11px rgba(0,0,0,.7),inset 0 -2px 5px rgba(255,205,130,.08),inset 0 0 0 1px rgba(0,0,0,.25);
        transition:box-shadow .22s ease, transform .15s cubic-bezier(.34,1.56,.64,1);
        -webkit-tap-highlight-color:transparent; }
  .pit.human{ --ac:var(--human); --gl:var(--human-glow); }
  .pit.ai{ --ac:var(--ai); --gl:var(--ai-glow); }
  .pit.playable{ cursor:pointer;
      box-shadow:inset 0 6px 11px rgba(0,0,0,.7),inset 0 -2px 5px rgba(255,205,130,.08),0 0 0 2.5px var(--ac),0 0 20px var(--gl); }
  .pit.playable:active{ transform:scale(.95); }
  .pit.last{ box-shadow:inset 0 6px 11px rgba(0,0,0,.7),inset 0 -2px 5px rgba(255,205,130,.08),0 0 0 2px rgba(255,255,255,.16); }
  .pit.source{ transform:scale(.97); }
  .pit.drop{ transform:scale(1.06); }
  .pit.capturing{ background:radial-gradient(circle at 50% 38%,#7a5320,#2a1a0e 82%); animation:flash .6s ease; }

  .seed{ position:absolute; width:16%; aspect-ratio:1; transform:translate(-50%,-50%); border-radius:50%;
         box-shadow:0 1px 2px rgba(0,0,0,.55),inset 0 -1px 1px rgba(120,90,40,.4),inset 0 1px 1px rgba(255,255,255,.45); }
  .badge{ position:absolute; bottom:-4px; right:-4px; min-width:24px; height:24px; padding:0 6px;
          display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700;
          font-size:clamp(15px,4.3vw,18px); color:#1a120a; background:var(--ac); border-radius:13px;
          box-shadow:0 2px 5px rgba(0,0,0,.6); line-height:1; transition:background .2s ease,color .2s ease; }
  .badge.empty{ background:rgba(0,0,0,.5); color:var(--muted); }

  #fly{ position:absolute; display:none; border-radius:50%; transform:translate(-50%,-50%); z-index:5; pointer-events:none;
        background:radial-gradient(circle at 34% 27%,#fdf6e3,#d9c294 58%,#a98a55);
        box-shadow:0 2px 6px rgba(0,0,0,.6),0 0 12px rgba(255,210,140,.55),inset 0 1px 1px rgba(255,255,255,.5); }
  #dim{ position:absolute; inset:0; border-radius:28px; background:rgba(12,8,5,.14); pointer-events:none; display:none; }

  .reset-wrap{ text-align:center; margin-top:18px; }
  .reset{ font-family:var(--sans); font-size:15.5px; font-weight:600; color:var(--text); padding:11px 26px; border-radius:12px;
          cursor:pointer; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.14); -webkit-tap-highlight-color:transparent; }

  /* ===== Fin de partie ===== */
  #overlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(8,5,3,.74); padding:24px; z-index:50; overflow:hidden; }
  #overlay.show{ display:flex; }
  .confetti span{ position:absolute; top:-20px; border-radius:50%; pointer-events:none; }
  .card{ position:relative; max-width:340px; width:100%; text-align:center; padding:32px 26px; border-radius:24px;
         background:linear-gradient(160deg,#8a572c,#3a2010); border:1px solid rgba(255,210,150,.22);
         box-shadow:0 26px 64px rgba(0,0,0,.62),inset 0 2px 0 rgba(255,220,170,.2); animation:cardin .45s cubic-bezier(.34,1.56,.64,1); }
  .card .reason{ font-size:11.5px; letter-spacing:.2em; text-transform:uppercase; color:#e9d4ab; }
  .card h2{ margin:9px 0 4px; font-family:var(--serif); font-weight:600; font-size:29px; }
  .card .final{ font-family:var(--serif); font-size:23px; margin:10px 0 24px; }
  .card .final .h{ color:var(--human); } .card .final .a{ color:var(--ai); } .card .final .s{ color:#e9d4ab; margin:0 11px; }
  .card .again{ font-family:var(--sans); font-size:15px; font-weight:600; color:#1a120a; padding:12px 30px; border-radius:12px;
                cursor:pointer; border:none; background:var(--human); box-shadow:0 6px 20px rgba(232,163,61,.55); -webkit-tap-highlight-color:transparent; }

  @keyframes blink{ 0%,100%{opacity:.3} 50%{opacity:1} }
  @keyframes scorepop{ 0%{transform:scale(.6);opacity:.4} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }
  @keyframes floatUp{ 0%{transform:translateY(4px);opacity:0} 25%{opacity:1} 100%{transform:translateY(-26px);opacity:0} }
  @keyframes cardin{ 0%{transform:scale(.85);opacity:0} 60%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
  @keyframes fall{ 0%{transform:translateY(-20px) rotate(0);opacity:0} 12%{opacity:1} 100%{transform:translateY(70vh) rotate(540deg);opacity:0} }
  @keyframes flash{ 0%{filter:brightness(2.2)} 100%{filter:brightness(1)} }
  @keyframes drift{ from{transform:translateX(-2.5%)} to{transform:translateX(2.5%)} }
  @keyframes shimmer{ 0%,100%{opacity:.55;transform:translateX(-50%) scaleX(1)} 50%{opacity:.85;transform:translateX(-50%) scaleX(1.15)} }
  @keyframes ripple{ from{background-position:0 0} to{background-position:0 18px} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important } .pit{ transition:none !important } }
</style>
</head>
<body>
  <!-- Décor -->
  <div class="scenery" aria-hidden="true">
    <div class="sky"></div>
    <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
    <div class="sun"></div>
    <svg class="mtn" viewBox="0 0 1200 220" preserveAspectRatio="none"><path d="M0,220 L0,120 C150,70 250,95 400,70 C520,50 640,100 780,72 C920,46 1050,92 1200,68 L1200,220 Z" fill="#5e8079"/></svg>
    <svg class="hills" viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,200 L0,120 C120,90 220,108 340,96 C470,82 540,120 660,104 C800,86 900,118 1040,100 C1110,92 1160,104 1200,100 L1200,200 Z" fill="#2c5340"/></svg>
    <svg class="shore" id="shore" viewBox="0 0 1200 220" preserveAspectRatio="xMidYMax slice"></svg>
    <div class="lake"></div>
    <div class="sunpath"></div>
    <div class="ripple"></div>
    <div class="veil"></div>
  </div>

  <!-- Jeu -->
  <div class="wrap">
    <div class="panel" id="panel">
      <div class="head">
        <h1>Awalé</h1>
        <p>Vous contre l'IA · 25 graines pour gagner</p>
      </div>

      <div class="scores">
        <div class="score human" id="score-h">
          <div class="label">Vous</div>
          <span class="num" id="num-h">0</span>
          <span class="plus" id="plus-h"></span>
        </div>
        <div class="score ai" id="score-a">
          <div class="label">IA</div>
          <span class="num" id="num-a">0</span>
          <span class="plus" id="plus-a"></span>
        </div>
      </div>

      <div class="row">
        <div class="seg diff" id="seg-diff">
          <button data-id="easy">Facile</button>
          <button data-id="medium">Moyen</button>
          <button data-id="hard">Difficile</button>
        </div>
        <button class="sound-btn" id="sound-btn" aria-label="Son"></button>
      </div>

      <div class="row">
        <span class="starter-label">1ᵉʳ coup</span>
        <div class="seg starter" id="seg-start">
          <button data-id="human">Vous</button>
          <button data-id="ai">IA</button>
          <button data-id="alt">Alterné</button>
        </div>
      </div>

      <div class="status">
        <div class="pill" id="pill"><span class="dot" id="dot"></span><span id="status-text">À vous de jouer</span></div>
      </div>

      <div class="board" id="board">
        <div class="brow" id="row-top"></div>
        <div class="bdiv"></div>
        <div class="brow" id="row-bottom"></div>
        <div class="camps"><span class="ai">Camp IA</span><span class="hu">Votre camp</span></div>
        <div id="fly"></div>
        <div id="dim"></div>
      </div>

      <div class="reset-wrap">
        <button class="reset" id="reset">Nouvelle partie</button>
      </div>
    </div>
  </div>

  <!-- Fin de partie -->
  <div id="overlay">
    <div class="confetti" id="confetti"></div>
    <div class="card">
      <div class="reason" id="ov-reason"></div>
      <h2 id="ov-title"></h2>
      <div class="final"><span class="h" id="ov-h">0</span><span class="s">–</span><span class="a" id="ov-a">0</span></div>
      <button class="again" id="again">Rejouer</button>
    </div>
  </div>

<script>
"use strict";

/* ============================================================
   MOTEUR DE JEU (fonctions pures)
   Plateau : 12 entiers. Cases 0–5 = Humain, 6–11 = IA.
   ============================================================ */
function sumRange(b, s, e){ var t=0; for(var i=s;i<=e;i++) t+=b[i]; return t; }
function sideOf(pit){ return pit<=5 ? "human" : "ai"; }
function oppRange(p){ return p==="human" ? [6,11] : [0,5]; }
function ownRange(p){ return p==="human" ? [0,5] : [6,11]; }

function applyCapture(b, lastIdx, player){
  var r=oppRange(player), os=r[0], oe=r[1], list=[], captured=0, c=lastIdx;
  while(c>=os && c<=oe && (b[c]===2 || b[c]===3)){ list.push(c); captured+=b[c]; c--; }
  if(captured>0 && captured===sumRange(b,os,oe)) return {captured:0, list:[]}; // annulée si vide le camp
  for(var i=0;i<list.length;i++) b[list[i]]=0;
  return {captured:captured, list:list};
}
function simulateMove(board, pit){
  var b=board.slice(), seeds=b[pit];
  if(seeds===0) return null;
  var player=sideOf(pit);
  b[pit]=0;
  var idx=pit;
  while(seeds>0){ idx=(idx+1)%12; if(idx===pit) continue; b[idx]++; seeds--; }
  var cap=applyCapture(b, idx, player);
  return {board:b, captured:cap.captured, capturedPits:cap.list, lastIndex:idx};
}
function getValidMoves(board, player){
  var ow=ownRange(player), op=oppRange(player), s=ow[0], e=ow[1], os=op[0], oe=op[1], cands=[];
  for(var i=s;i<=e;i++) if(board[i]>0) cands.push(i);
  if(sumRange(board,os,oe)===0){
    var feeding=cands.filter(function(i){ return sumRange(simulateMove(board,i).board,os,oe)>0; });
    return feeding.length ? feeding : [];
  }
  return cands;
}
function isMoveValid(board, player, pit){ return getValidMoves(board,player).indexOf(pit)!==-1; }
function playMove(state, pit){
  var player=state.turn, sim=simulateMove(state.board, pit);
  return {
    board: sim.board,
    humanScore: state.humanScore + (player==="human"?sim.captured:0),
    aiScore: state.aiScore + (player==="ai"?sim.captured:0),
    turn: player==="human"?"ai":"human"
  };
}
function checkGameOver(state){
  var board=state.board, hs=state.humanScore, as=state.aiScore, turn=state.turn;
  var reach = hs>=25 || as>=25;
  var blocked = getValidMoves(board,turn).length===0;
  if(reach || blocked){
    var fh=hs+sumRange(board,0,5), fa=as+sumRange(board,6,11);
    return {over:true, finalHuman:fh, finalAi:fa, winner: fh>fa?"human":(fa>fh?"ai":"draw"), reason: reach?"25":"blocked"};
  }
  return {over:false, finalHuman:hs, finalAi:as};
}
// IA « Facile » : capture immédiate max, puis graines conservées, puis aléatoire.
function aiChooseMove(board){
  var moves=getValidMoves(board,"ai");
  if(!moves.length) return null;
  var res=moves.map(function(m){ var s=simulateMove(board,m); return {m:m, cap:s.captured, own:sumRange(s.board,6,11)}; });
  var maxCap=Math.max.apply(null,res.map(function(r){return r.cap;}));
  var f=res.filter(function(r){return r.cap===maxCap;});
  var maxOwn=Math.max.apply(null,f.map(function(r){return r.own;}));
  f=f.filter(function(r){return r.own===maxOwn;});
  return f[Math.floor(Math.random()*f.length)].m;
}
// IA « Moyen / Difficile » : minimax + alpha-bêta + approfondissement itératif borné en temps.
function evaluate(s){ return (s.aiScore-s.humanScore)*14 + (sumRange(s.board,6,11)-sumRange(s.board,0,5)); }
var TIMEOUT={};
function minimax(state, depth, alpha, beta, deadline){
  if(Date.now()>deadline) throw TIMEOUT;
  var over=checkGameOver(state);
  if(over.over) return (over.finalAi-over.finalHuman)*1000;
  if(depth<=0) return evaluate(state);
  var moves=getValidMoves(state.board, state.turn), v, best, i;
  if(state.turn==="ai"){
    best=-Infinity;
    for(i=0;i<moves.length;i++){ v=minimax(playMove(state,moves[i]),depth-1,alpha,beta,deadline); if(v>best)best=v; if(best>alpha)alpha=best; if(alpha>=beta)break; }
    return best;
  } else {
    best=Infinity;
    for(i=0;i<moves.length;i++){ v=minimax(playMove(state,moves[i]),depth-1,alpha,beta,deadline); if(v<best)best=v; if(best<beta)beta=best; if(beta<=alpha)break; }
    return best;
  }
}
function rootBest(state, depth, deadline){
  var moves=getValidMoves(state.board,"ai"), bestScore=-Infinity, scored=[], i, v;
  for(i=0;i<moves.length;i++){ v=minimax(playMove(state,moves[i]),depth-1,-Infinity,Infinity,deadline); scored.push({m:moves[i],v:v}); if(v>bestScore)bestScore=v; }
  var top=scored.filter(function(s){return s.v===bestScore;});
  return top[Math.floor(Math.random()*top.length)].m;
}
function aiSearchMove(state, maxDepth, budgetMs){
  var deadline=Date.now()+budgetMs, chosen=getValidMoves(state.board,"ai")[0], d;
  for(d=2; d<=maxDepth; d++){ try{ chosen=rootBest(state,d,deadline); }catch(e){ if(e!==TIMEOUT) throw e; break; } }
  return chosen;
}
function sowPath(board, pit){
  var seeds=board[pit], idx=pit, path=[];
  while(seeds>0){ idx=(idx+1)%12; if(idx===pit) continue; path.push(idx); seeds--; }
  return path;
}

/* ============================================================
   SON (Web Audio synthétisé) + vibration
   ============================================================ */
var actx=null;
function audio(){
  try{
    if(!actx){ var AC=window.AudioContext||window.webkitAudioContext; if(AC) actx=new AC(); }
    if(actx && actx.state==="suspended") actx.resume();
  }catch(e){}
  return actx;
}
function tone(freq, dur, type, gain, when){
  var ctx=audio(); if(!ctx) return; when=when||0;
  var o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(ctx.destination);
  var t=ctx.currentTime+when;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
var sfx={
  drop:function(i){ tone(196+(i%8)*16, 0.09, "triangle", 0.05); },
  capture:function(){ tone(540,0.12,"sine",0.06); tone(820,0.16,"sine",0.05,0.07); },
  win:function(){ [523,659,784,1047].forEach(function(f,i){ tone(f,0.22,"sine",0.06,i*0.1); }); },
  lose:function(){ [392,330,262].forEach(function(f,i){ tone(f,0.28,"sine",0.06,i*0.12); }); },
  draw:function(){ tone(440,0.3,"sine",0.05); tone(440,0.3,"sine",0.05,0.12); }
};
function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

/* ============================================================
   DÉCOR : génération des palmiers de la rive
   ============================================================ */
function buildPalm(x, baseY, h, color, lean){
  var cx=x+h*lean, cy=baseY-h;
  var s='<path d="M'+x+','+baseY+' Q'+(x+h*lean*0.5)+','+(baseY-h*0.5)+' '+cx+','+cy+'" stroke="'+color+'" stroke-width="'+Math.max(2,h*0.05)+'" fill="none" stroke-linecap="round"/>';
  [-168,-140,-112,-84,-56,-28,0].forEach(function(deg){
    var a=deg*Math.PI/180, len=h*0.6;
    var ex=cx+Math.cos(a)*len, ey=cy+Math.sin(a)*len+len*0.22;
    var mx=cx+Math.cos(a)*len*0.5, my=cy+Math.sin(a)*len*0.5-len*0.14;
    s+='<path d="M'+cx+','+cy+' Q'+mx+','+my+' '+ex+','+ey+'" stroke="'+color+'" stroke-width="'+Math.max(1.4,h*0.028)+'" fill="none" stroke-linecap="round"/>';
  });
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+Math.max(2,h*0.05)+'" fill="'+color+'"/>';
  return s;
}
(function initShore(){
  var canopy='<path d="M0,220 L0,158 C90,128 170,150 260,142 C360,133 430,165 540,152 C650,139 740,168 860,150 C980,132 1080,160 1200,146 L1200,220 Z" fill="#13301d"/>';
  document.getElementById("shore").innerHTML =
    buildPalm(140,150,120,"#102a1a",0.12) +
    buildPalm(1010,150,132,"#0e2618",-0.14) +
    buildPalm(760,158,96,"#0e2618",0.08) +
    canopy;
})();

/* ============================================================
   UI / ÉTAT
   ============================================================ */
var TOP=[11,10,9,8,7,6], BOTTOM=[0,1,2,3,4,5];
var LAYOUTS={
  1:[[.5,.5]], 2:[[.38,.5],[.62,.5]], 3:[[.5,.35],[.36,.63],[.64,.63]],
  4:[[.36,.36],[.64,.36],[.36,.64],[.64,.64]],
  5:[[.5,.3],[.32,.5],[.68,.5],[.4,.72],[.6,.72]],
  6:[[.36,.32],[.64,.32],[.28,.56],[.72,.56],[.42,.76],[.58,.76]]
};
var SCATTER=[[.5,.5],[.33,.34],[.67,.33],[.31,.67],[.69,.66],[.5,.25],[.5,.75],[.24,.5],[.76,.5],[.4,.42],[.6,.42],[.4,.6],[.6,.6]];
function seedPositions(n){ return n<=6 ? (LAYOUTS[n]||[]) : SCATTER.slice(0, Math.min(n, SCATTER.length)); }
var SEED_TONES=[
  "radial-gradient(circle at 34% 27%,#fdf6e3,#d9c294 58%,#a98a55)",
  "radial-gradient(circle at 34% 27%,#f7ecd2,#cdb583 58%,#997b4b)",
  "radial-gradient(circle at 34% 27%,#fff4de,#e0caa0 58%,#b39668)",
  "radial-gradient(circle at 34% 27%,#f3e6c9,#c8ad78 58%,#927442)"
];

// État logique
var board, humanScore, aiScore, turn;
var displayBoard;
var busy=false;
var difficulty="medium", starter="alt", soundOn=true;
var altNext="human"; // qui ouvre la prochaine partie en mode alterné
var lastMovePit=-1;
var prevH=0, prevA=0;
var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// Références DOM
var boardEl=document.getElementById("board");
var flyEl=document.getElementById("fly");
var dimEl=document.getElementById("dim");
var pitEls={}, badgeEls={};

// Construction des cases
function buildRow(rowEl, indices, side){
  indices.forEach(function(idx){
    var btn=document.createElement("button");
    btn.className="pit "+side;
    btn.setAttribute("aria-label","Case "+idx);
    var badge=document.createElement("span");
    badge.className="badge";
    btn.appendChild(badge);
    btn.addEventListener("click", function(){ onPitClick(idx); });
    rowEl.appendChild(btn);
    pitEls[idx]=btn; badgeEls[idx]=badge;
  });
}
buildRow(document.getElementById("row-top"), TOP, "ai");
buildRow(document.getElementById("row-bottom"), BOTTOM, "human");

function renderPit(idx, count){
  var btn=pitEls[idx];
  // retire les graines précédentes (garde le badge)
  var olds=btn.querySelectorAll(".seed");
  for(var k=0;k<olds.length;k++) btn.removeChild(olds[k]);
  var pos=seedPositions(count);
  for(var i=0;i<pos.length;i++){
    var sp=document.createElement("span");
    sp.className="seed";
    var ti=(idx*7+i);
    sp.style.left=(pos[i][0]*100)+"%";
    sp.style.top=(pos[i][1]*100)+"%";
    sp.style.transform="translate(-50%,-50%) rotate("+((ti*47)%360)+"deg)";
    sp.style.background=SEED_TONES[ti%SEED_TONES.length];
    btn.appendChild(sp);
  }
  var badge=badgeEls[idx];
  badge.textContent=count;
  if(count===0) badge.classList.add("empty"); else badge.classList.remove("empty");
}
function renderBoard(b){ for(var i=0;i<12;i++) renderPit(i, b[i]); }

function clearPitFx(){
  for(var i=0;i<12;i++){ pitEls[i].classList.remove("source","drop","capturing","last","playable"); }
}

// Sélecteurs / boutons
var segDiff=document.getElementById("seg-diff");
var segStart=document.getElementById("seg-start");
var soundBtn=document.getElementById("sound-btn");

function speakerSVG(on){
  var col = on ? "var(--human)" : "var(--muted)";
  var inner = on
    ? '<path d="M16.5 8.5a5 5 0 0 1 0 7"/><path d="M19 6a8 8 0 0 1 0 12"/>'
    : '<path d="M17 9l5 5M22 9l-5 5"/>';
  return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
    + '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="'+col+'" fill-opacity="'+(on?0.25:0)+'"/>' + inner + '</svg>';
}

function state(){ return {board:board, humanScore:humanScore, aiScore:aiScore, turn:turn}; }

function render(){
  var res=checkGameOver(state());
  var over=res.over;
  var locked = busy || turn==="ai";

  // Scores (avec petit « pop » si changement)
  var nh=document.getElementById("num-h"), na=document.getElementById("num-a");
  nh.textContent=humanScore; na.textContent=aiScore;
  if(humanScore!==prevH){ replay(nh,"scorepop .45s cubic-bezier(.34,1.56,.64,1)"); prevH=humanScore; }
  if(aiScore!==prevA){ replay(na,"scorepop .45s cubic-bezier(.34,1.56,.64,1)"); prevA=aiScore; }

  document.getElementById("score-h").classList.toggle("active", turn==="human" && !over);
  document.getElementById("score-a").classList.toggle("active", turn==="ai" && !over);

  // Difficulté / premier coup / son
  Array.prototype.forEach.call(segDiff.children, function(b){ b.classList.toggle("on", b.dataset.id===difficulty); });
  Array.prototype.forEach.call(segStart.children, function(b){ b.classList.toggle("on", b.dataset.id===starter); });
  segDiff.classList.toggle("locked", locked);
  segStart.classList.toggle("locked", locked);
  soundBtn.classList.toggle("on", soundOn);
  soundBtn.innerHTML=speakerSVG(soundOn);

  // Statut
  var pill=document.getElementById("pill"), dot=document.getElementById("dot"), st=document.getElementById("status-text");
  var text = over ? "Partie terminée" : (turn==="human" ? (busy ? "Semis en cours" : "À vous de jouer") : "L'IA réfléchit");
  st.textContent = text + (!over && turn==="ai" ? " …" : "");
  var col = over ? "var(--muted)" : (turn==="human" ? "var(--human)" : "var(--ai)");
  dot.style.background=col;
  pill.classList.toggle("live", !over);
  pill.style.borderColor = over ? "rgba(255,255,255,.15)" : (turn==="human" ? "rgba(232,163,61,.4)" : "rgba(86,185,173,.4)");

  // Cases jouables (humain)
  var valid = (turn==="human" && !over && !busy) ? getValidMoves(board,"human") : [];
  for(var i=0;i<=5;i++) pitEls[i].classList.toggle("playable", valid.indexOf(i)!==-1);
  for(var j=6;j<=11;j++) pitEls[j].classList.remove("playable");
  for(var p=0;p<12;p++) pitEls[p].classList.toggle("last", p===lastMovePit && !pitEls[p].classList.contains("playable"));

  dimEl.style.display = (busy || (turn==="ai" && !over)) ? "block" : "none";
}

function replay(el, anim){ el.style.animation="none"; void el.offsetWidth; el.style.animation=anim; }

function pitCenter(idx){
  var b=boardEl.getBoundingClientRect(), r=pitEls[idx].getBoundingClientRect();
  return {x:r.left-b.left+r.width/2, y:r.top-b.top+r.height/2};
}
function sleep(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }

/* ============================================================
   COUP + ANIMATION
   ============================================================ */
function onPitClick(idx){
  audio();
  if(turn!=="human" || busy) return;
  if(checkGameOver(state()).over) return;
  if(!isMoveValid(board,"human",idx)) return;
  animateMove(idx);
}

function commit(curState, pit){
  var sim=simulateMove(curState.board, pit);
  var player=curState.turn;
  board=sim.board;
  humanScore=curState.humanScore + (player==="human"?sim.captured:0);
  aiScore=curState.aiScore + (player==="ai"?sim.captured:0);
  turn=(player==="human"?"ai":"human");
  lastMovePit=pit;
  // +N flottant
  if(sim.captured>0){
    var plus=document.getElementById(player==="human"?"plus-h":"plus-a");
    plus.textContent="+"+sim.captured;
    plus.classList.remove("go"); void plus.offsetWidth; plus.classList.add("go");
  }
  renderBoard(board);
}

function afterMove(){
  busy=false;
  render();
  var res=checkGameOver(state());
  if(res.over){ showOverlay(res); return; }
  maybeAI();
}

var aiTimer=null;
function maybeAI(){
  if(turn==="ai" && !busy && !checkGameOver(state()).over){
    clearTimeout(aiTimer);
    aiTimer=setTimeout(function(){
      var mv;
      if(difficulty==="easy") mv=aiChooseMove(board);
      else if(difficulty==="medium") mv=aiSearchMove(state(),5,250);
      else mv=aiSearchMove(state(),11,650);
      animateMove(mv);
    }, 460);
  }
}

async function animateMove(pit){
  if(busy || pit==null) return;
  busy=true; render();
  var cur=state();
  var player=cur.turn;
  var sim=simulateMove(cur.board, pit);
  var path=sowPath(cur.board, pit);
  var n=path.length;

  if(reduced){
    renderBoard(sim.board);
    if(sim.capturedPits.length){
      sim.capturedPits.forEach(function(p){ pitEls[p].classList.add("capturing"); });
      if(soundOn) sfx.capture(); buzz(25);
      await sleep(450);
      sim.capturedPits.forEach(function(p){ pitEls[p].classList.remove("capturing"); });
    }
    commit(cur, pit); afterMove(); return;
  }

  var perHop = Math.max(52, Math.min(132, 900/n));
  var disp=cur.board.slice(); disp[pit]=0;
  pitEls[pit].classList.add("source");
  renderBoard(disp);

  // graine en vol
  var pw=pitEls[0].getBoundingClientRect().width;
  var fsize=Math.max(9, pw*0.26);
  flyEl.style.width=fsize+"px"; flyEl.style.height=(fsize*0.92)+"px";
  var c0=pitCenter(pit);
  flyEl.style.transition="none"; flyEl.style.left=c0.x+"px"; flyEl.style.top=c0.y+"px"; flyEl.style.display="block";
  await sleep(110);

  for(var i=0;i<n;i++){
    var tgt=path[i], c=pitCenter(tgt);
    flyEl.style.transition="left "+perHop+"ms cubic-bezier(.4,.05,.5,1), top "+perHop+"ms cubic-bezier(.45,-.25,.55,1.25)";
    flyEl.style.left=c.x+"px"; flyEl.style.top=c.y+"px";
    await sleep(perHop);
    disp[tgt]++; renderBoard(disp);
    pitEls[tgt].classList.add("drop");
    if(soundOn) sfx.drop(i);
    await sleep(perHop*0.4);
    pitEls[tgt].classList.remove("drop");
  }
  flyEl.style.display="none";
  pitEls[pit].classList.remove("source");
  await sleep(170);

  if(sim.capturedPits.length){
    sim.capturedPits.forEach(function(p){ pitEls[p].classList.add("capturing"); });
    if(soundOn) sfx.capture(); buzz(28);
    await sleep(150);
    renderBoard(sim.board);
    await sleep(540);
    sim.capturedPits.forEach(function(p){ pitEls[p].classList.remove("capturing"); });
  }

  commit(cur, pit);
  afterMove();
}

/* ============================================================
   FIN DE PARTIE
   ============================================================ */
var endFired=false;
function showOverlay(res){
  var ov=document.getElementById("overlay");
  document.getElementById("ov-reason").textContent = res.reason==="25" ? "Seuil de 25 atteint" : "Plus de coup possible";
  document.getElementById("ov-title").textContent = res.winner==="human" ? "Vous gagnez" : (res.winner==="ai" ? "L'IA gagne" : "Égalité");
  document.getElementById("ov-h").textContent=res.finalHuman;
  document.getElementById("ov-a").textContent=res.finalAi;

  var cols = res.winner==="human" ? ["#e8a33d","#f3e9d6","#f4c66b"] : (res.winner==="ai" ? ["#56b9ad","#f3e9d6","#8fd6cd"] : ["#a98f70","#f3e9d6"]);
  var cont=document.getElementById("confetti"); cont.innerHTML="";
  if(!reduced){
    for(var i=0;i<22;i++){
      var sp=document.createElement("span");
      var size=7+Math.random()*7;
      sp.style.left=(Math.random()*100)+"%";
      sp.style.width=size+"px"; sp.style.height=(size*0.92)+"px";
      sp.style.background=cols[i%cols.length];
      sp.style.transform="rotate("+(Math.random()*360)+"deg)";
      sp.style.animation="fall "+(1.4+Math.random()*1.1)+"s ease-in "+(Math.random()*0.5)+"s forwards";
      cont.appendChild(sp);
    }
  }
  ov.classList.add("show");
  if(!endFired){
    endFired=true;
    if(soundOn){ (res.winner==="human"?sfx.win:res.winner==="ai"?sfx.lose:sfx.draw)(); }
    buzz(res.winner==="human" ? [40,50,90] : 60);
  }
}

/* ============================================================
   NOUVELLE PARTIE / RÉGLAGES
   ============================================================ */
function nextStartTurn(){
  if(starter==="human") return "human";
  if(starter==="ai") return "ai";
  var t=altNext; altNext = (t==="human"?"ai":"human"); return t; // alterné
}
function startNewGame(turnArg){
  clearTimeout(aiTimer);
  board=[4,4,4,4,4,4,4,4,4,4,4,4];
  humanScore=0; aiScore=0; turn=turnArg;
  displayBoard=board.slice();
  busy=false; endFired=false; lastMovePit=-1; prevH=0; prevA=0;
  flyEl.style.display="none";
  clearPitFx();
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("plus-h").classList.remove("go");
  document.getElementById("plus-a").classList.remove("go");
  renderBoard(board);
  render();
  maybeAI();
}
function pickDifficulty(id){ if(busy || turn==="ai") return; difficulty=id; render(); }
function pickStarter(id){
  if(busy || turn==="ai") return;
  starter=id;
  if(id==="alt") altNext="human";
  startNewGame(nextStartTurn());
}
function toggleSound(){ audio(); soundOn=!soundOn; if(soundOn) sfx.drop(0); render(); }

// Écouteurs
Array.prototype.forEach.call(segDiff.children, function(b){ b.addEventListener("click", function(){ pickDifficulty(b.dataset.id); }); });
Array.prototype.forEach.call(segStart.children, function(b){ b.addEventListener("click", function(){ pickStarter(b.dataset.id); }); });
soundBtn.addEventListener("click", toggleSound);
document.getElementById("reset").addEventListener("click", function(){ startNewGame(nextStartTurn()); });
document.getElementById("again").addEventListener("click", function(){ startNewGame(nextStartTurn()); });

// Démarrage : la première partie commence par Vous (mode alterné par défaut).
altNext="ai";
startNewGame("human");
requestAnimationFrame(function(){ document.getElementById("panel").classList.add("in"); });
</script>
